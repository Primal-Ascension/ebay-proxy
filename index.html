<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #07070f; color: #ddd8cc; font-family: 'Courier New', monospace; min-height: 100vh; }
header { background: linear-gradient(135deg,#0f0f1a,#1a0f0a); border-bottom: 1px solid #2a2a1a; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px #4ade80; }
.label { font-size: 10px; color: #f7c948; letter-spacing: .2em; text-transform: uppercase; }
h1 { font-size: 20px; color: #fff; margin-top: 3px; }
main { padding: 20px 24px; max-width: 760px; margin: 0 auto; }
.card { background: #10101a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 18px; margin-bottom: 18px; }
.card-label { font-size: 10px; color: #f7c948; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 12px; }
.row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
input { background: #07070f; border: 1px solid #3a3a5a; border-radius: 6px; color: #ddd8cc; padding: 9px 12px; font-size: 13px; font-family: monospace; outline: none; flex: 1; min-width: 0; }
input.short { max-width: 120px; }
button { border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; font-family: monospace; padding: 9px 20px; white-space: nowrap; }
.btn-yellow { background: #0a0a0f; color: #f7c948; border: 1px solid #f7c948; }
.btn-green { background: #0a0f0a; color: #4ade80; border: 1px solid #4ade80; }
.btn-red { background: #1a0a0a; color: #ff6b6b; border: 1px solid #ff6b6b; }
.result-row { display: flex; justify-content: space-between; padding: 7px 10px; border-radius: 4px; margin-bottom: 3px; gap: 10px; font-size: 12px; align-items: center; }
.result-row:nth-child(odd) { background: #14141f; }
.result-row:nth-child(even) { background: #0e0e18; }
.result-row a { color: #a0a8c0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-decoration: none; }
.price { color: #4ade80; font-weight: bold; white-space: nowrap; }
.date { color: #555; white-space: nowrap; font-size: 11px; }
.progress-bar { background: #1a1a2a; border-radius: 4px; height: 5px; margin-bottom: 14px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#f7c948,#4ade80); transition: width 0.4s; }
.log-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #1a1a2a; font-size: 12px; }
.log-name { color: #c8c0b0; }
.log-val { color: #4ade80; font-weight: bold; }
.fail-item { font-size: 12px; color: #666; padding: 3px 0; }
.log-card { background: #10101a; border: 1px solid #1a2a1a; border-radius: 8px; padding: 18px; margin-bottom: 12px; max-height: 320px; overflow-y: auto; }
.fail-card { background: #100a0a; border: 1px solid #2a1a1a; border-radius: 8px; padding: 18px; max-height: 180px; overflow-y: auto; }
.fail-label { font-size: 10px; color: #ff6b6b; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px; }
.success-label { font-size: 10px; color: #4ade80; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px; }
.status { font-size: 13px; color: #4ade80; margin-top: 8px; }
.no-results { color: #666; font-size: 12px; }
</style>

      <div class="progress-bar"><div class="progress-fill" id="prog-bar" style="width:0%"></div></div>
      <button class="btn-red" onclick="stopBulk()">■ Stop</button>

  </div>

  <div id="log-section" style="display:none">
    <div class="log-card">

const sleep = ms => new Promise(r => setTimeout(r, ms));

async function doSingle() {
  const q = document.getElementById("sq").value.trim();
  const g = document.getElementById("sg").value.trim();
  if (!q) return;
  const el = document.getElementById("single-results");
  el.innerHTML = '<div class="no-results">Searching...</div>';
  try {
    const params = new URLSearchParams({ q });
    if (g) params.append("grade", g);
    const res = await fetch(`${PROXY}/sold?${params}`);
    const data = await res.json();
    const results = data.results || [];
    if (!results.length) { el.innerHTML = '<div class="no-results">No results.</div>'; return; }
    el.innerHTML = results.map((r, i) => `
      <div class="result-row">
        <a href="${r.url}" target="_blank">${(r.title||'').slice(0,60)}...</a>
        <span class="price">$${parseFloat(r.price||0).toFixed(2)}</span>
        <span class="date">${(r.date||'').slice(0,10)}</span>
      </div>`).join('');
  } catch(e) {
    el.innerHTML = `<div class="no-results">Error: ${e.message}</div>`;
  }
}

async function doBulk() {
  aborted = false; logCount = 0; failCount = 0;
  document.getElementById("bulk-controls").style.display = "none";
  document.getElementById("bulk-progress").style.display = "block";
  document.getElementById("log-section").style.display = "none";
  document.getElementById("fail-section").style.display = "none";
  document.getElementById("log-items").innerHTML = "";
  document.getElementById("fail-items").innerHTML = "";
  document.getElementById("bulk-status").style.display = "none";

  const today = new Date().toISOString().slice(0,10);

  for (let i = 0; i < CARDS.length; i++) {
    if (aborted) break;
    const c = CARDS[i];
    const pct = Math.round(i / CARDS.length * 100);
    document.getElementById("prog-bar").style.width = pct + "%";
    document.getElementById("prog-pct").textContent = pct + "%";
    document.getElementById("prog-count").textContent = `${i} / ${CARDS.length}`;

    try {
      const params = new URLSearchParams({ q: c.name });
      if (c.grade) params.append("grade", c.grade);
      const res = await fetch(`${PROXY}/sold?${params}`);
      const data = await res.json();
      const results = data.results || [];

      if (results.length) {
        const top = results[0];
        const txt = `$${parseFloat(top.price).toFixed(2)} — ${(top.date||'').slice(0,10)}`;

        // Push to Smartsheet via proxy
        await fetch("/push", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ rowId: c.rowId, saleText: txt, dateText: today })
        });

        logCount++;
        document.getElementById("log-label").textContent = `✓ Updated (${logCount})`;
        document.getElementById("log-section").style.display = "block";
        document.getElementById("log-items").innerHTML += `
          <div class="log-item">
            <span class="log-name">${c.name}${c.grade ? ' · '+c.grade : ''}</span>
            <span class="log-val">${txt}</span>
          </div>`;
      } else {
        failCount++;
        document.getElementById("fail-label").textContent = `✗ No Results (${failCount})`;
        document.getElementById("fail-section").style.display = "block";
        document.getElementById("fail-items").innerHTML += `<div class="fail-item">${c.name}</div>`;
      }
    } catch(e) {
      failCount++;
      document.getElementById("fail-label").textContent = `✗ No Results (${failCount})`;
      document.getElementById("fail-section").style.display = "block";
      document.getElementById("fail-items").innerHTML += `<div class="fail-item">${c.name} — ${e.message}</div>`;
    }

    await sleep(700);
  }

  document.getElementById("prog-bar").style.width = "100%";
  document.getElementById("prog-pct").textContent = "100%";
  document.getElementById("prog-count").textContent = `${CARDS.length} / ${CARDS.length}`;
  const stopBtn = document.querySelector(".btn-red");
  if (stopBtn) stopBtn.style.display = "none";
  const status = document.getElementById("bulk-status");
  status.style.display = "block";
  status.textContent = `✓ Complete — ${logCount} updated · ${failCount} no results`;
}

function stopBulk() { aborted = true; }
